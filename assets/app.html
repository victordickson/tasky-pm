<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasky - Task Management</title>
    <link rel="stylesheet" href="assets/css/app.css">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Tasky</h2>
                <span id="username" class="username"></span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-view="dashboard">
                    <i class="uil uil-dashboard"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-view="tasks">
                    <i class="uil uil-check-square"></i>
                    <span>Tasks</span>
                </a>
                <a href="#" class="nav-item" data-view="kanban">
                    <i class="uil uil-columns"></i>
                    <span>Kanban Board</span>
                </a>
                <a href="#" class="nav-item" data-view="calendar">
                    <i class="uil uil-calendar-alt"></i>
                    <span>Calendar</span>
                </a>
                <a href="#" class="nav-item" data-view="projects">
                    <i class="uil uil-folder"></i>
                    <span>Projects</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button class="btn-logout" onclick="logout()">
                    <i class="uil uil-sign-out-alt"></i>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Dashboard View -->
            <div id="dashboard-view" class="view active">
                <div class="view-header">
                    <h1>Dashboard</h1>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #e3f2fd;">
                            <i class="uil uil-check-circle" style="color: #2196f3;"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-total">0</h3>
                            <p>Total Tasks</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #e8f5e9;">
                            <i class="uil uil-check" style="color: #4caf50;"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-completed">0</h3>
                            <p>Completed</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #fff3e0;">
                            <i class="uil uil-clock"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-pending">0</h3>
                            <p>Pending</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #ffebee;">
                            <i class="uil uil-exclamation-triangle" style="color: #f44336;"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-overdue">0</h3>
                            <p>Overdue</p>
                        </div>
                    </div>
                </div>

                <div class="dashboard-content">
                    <div class="recent-tasks">
                        <h2>Recent Tasks</h2>
                        <div id="recent-tasks-list"></div>
                    </div>
                </div>
            </div>

            <!-- Tasks View -->
            <div id="tasks-view" class="view">
                <div class="view-header">
                    <h1>Tasks</h1>
                    <button class="btn-primary" onclick="openTaskModal()">
                        <i class="uil uil-plus"></i> New Task
                    </button>
                </div>

                <div class="filters-bar">
                    <div class="filter-group">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="pending">Pending</button>
                        <button class="filter-btn" data-filter="in-progress">In Progress</button>
                        <button class="filter-btn" data-filter="completed">Completed</button>
                    </div>
                    <div class="filter-group">
                        <select id="priority-filter" class="filter-select">
                            <option value="">All Priorities</option>
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                            <option value="critical">Critical</option>
                        </select>
                        <select id="project-filter" class="filter-select">
                            <option value="">All Projects</option>
                        </select>
                        <input type="text" id="search-tasks" class="search-input" placeholder="Search tasks...">
                    </div>
                </div>

                <div id="tasks-list" class="tasks-list"></div>
            </div>

            <!-- Kanban View -->
            <div id="kanban-view" class="view">
                <div class="view-header">
                    <h1>Kanban Board</h1>
                    <button class="btn-primary" onclick="openTaskModal()">
                        <i class="uil uil-plus"></i> New Task
                    </button>
                </div>

                <div class="kanban-board">
                    <div class="kanban-column" data-status="pending">
                        <div class="column-header">
                            <h3>Pending</h3>
                            <span class="task-count" id="pending-count">0</span>
                        </div>
                        <div class="column-tasks" id="pending-tasks"></div>
                    </div>
                    <div class="kanban-column" data-status="in-progress">
                        <div class="column-header">
                            <h3>In Progress</h3>
                            <span class="task-count" id="in-progress-count">0</span>
                        </div>
                        <div class="column-tasks" id="in-progress-tasks"></div>
                    </div>
                    <div class="kanban-column" data-status="completed">
                        <div class="column-header">
                            <h3>Completed</h3>
                            <span class="task-count" id="completed-count">0</span>
                        </div>
                        <div class="column-tasks" id="completed-tasks"></div>
                    </div>
                </div>
            </div>

            <!-- Calendar View -->
            <div id="calendar-view" class="view">
                <div class="view-header">
                    <h1>Calendar</h1>
                </div>
                <div id="calendar-container">
                    <div class="calendar-header">
                        <button onclick="previousMonth()" class="btn-icon"><i class="uil uil-angle-left"></i></button>
                        <h2 id="calendar-month-year"></h2>
                        <button onclick="nextMonth()" class="btn-icon"><i class="uil uil-angle-right"></i></button>
                    </div>
                    <div id="calendar-grid" class="calendar-grid"></div>
                </div>
            </div>

            <!-- Projects View -->
            <div id="projects-view" class="view">
                <div class="view-header">
                    <h1>Projects</h1>
                    <button class="btn-primary" onclick="openProjectModal()">
                        <i class="uil uil-plus"></i> New Project
                    </button>
                </div>
                <div id="projects-list" class="projects-grid"></div>
            </div>
        </main>
    </div>

    <!-- Task Modal -->
    <div id="task-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">New Task</h2>
                <button class="btn-close" onclick="closeTaskModal()">
                    <i class="uil uil-times"></i>
                </button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <div class="form-group">
                    <label>Task Name *</label>
                    <input type="text" id="task-name" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="task-description" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Priority</label>
                        <select id="task-priority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                            <option value="critical">Critical</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="task-status">
                            <option value="pending">Pending</option>
                            <option value="in-progress">In Progress</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Due Date</label>
                        <input type="datetime-local" id="task-due-date">
                    </div>
                    <div class="form-group">
                        <label>Project</label>
                        <select id="task-project">
                            <option value="">No Project</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="task-category" placeholder="e.g., Work, Personal">
                </div>
                <div class="form-group">
                    <label>Tags</label>
                    <input type="text" id="task-tags" placeholder="Comma separated tags">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeTaskModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Project Modal -->
    <div id="project-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>New Project</h2>
                <button class="btn-close" onclick="closeProjectModal()">
                    <i class="uil uil-times"></i>
                </button>
            </div>
            <form id="project-form">
                <div class="form-group">
                    <label>Project Name *</label>
                    <input type="text" id="project-name" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="project-description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Color</label>
                    <input type="color" id="project-color" value="#2196f3">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeProjectModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Create Project</button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
